<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Falconridge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --bg-2: #1a1a1a;
      --bg-3: #242424;
      --bg-4: #2e2e2e;
      --border: rgba(255,255,255,0.08);
      --border-2: rgba(255,255,255,0.14);
      --text: #f0f0f0;
      --text-2: #888;
      --text-3: #555;
      --accent: #1D9E75;
      --accent-dim: rgba(29,158,117,0.15);
      --accent-border: rgba(29,158,117,0.3);
      --blue-dim: rgba(55,138,221,0.12);
      --blue-border: rgba(55,138,221,0.25);
      --blue: #378ADD;
      --danger: #e24b4a;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 6px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* AUTH */
    #auth-screen {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    #auth-card {
      background: var(--bg-2);
      border: 0.5px solid var(--border-2);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 360px;
    }

    .auth-logo {
      width: 38px;
      height: 38px;
      background: var(--accent-dim);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }

    #auth-card h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    #auth-card .sub { font-size: 13px; color: var(--text-2); margin-bottom: 1.5rem; }

    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 12px; color: var(--text-2); margin-bottom: 4px; }

    input[type="text"], input[type="password"] {
      width: 100%;
      background: var(--bg-3);
      border: 0.5px solid var(--border-2);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      margin-top: 14px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      padding: 10px;
      cursor: pointer;
      transition: opacity 0.15s;
      font-family: inherit;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }

    .auth-toggle {
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      color: var(--text-2);
    }
    .auth-toggle a { color: var(--accent); cursor: pointer; text-decoration: none; }

    .auth-error {
      font-size: 12px;
      color: var(--danger);
      margin-top: 10px;
      display: none;
    }

    /* APP LAYOUT */
    #app {
      display: none;
      height: 100vh;
      height: 100dvh;
    }

    .layout {
      display: flex;
      height: 100%;
    }

    /* SIDEBAR */
    #sidebar {
      width: 240px;
      min-width: 240px;
      background: var(--bg-2);
      border-right: 0.5px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .sidebar-top {
      padding: 14px 12px 10px;
      border-bottom: 0.5px solid var(--border);
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .brand-icon {
      width: 28px;
      height: 28px;
      background: var(--accent-dim);
      border-radius: var(--radius-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }

    .brand-name { font-size: 14px; font-weight: 600; }

    .new-thread-btn {
      width: 100%;
      background: var(--bg-3);
      border: 0.5px solid var(--border-2);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 13px;
      padding: 8px 10px;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
      font-family: inherit;
    }
    .new-thread-btn:hover { background: var(--bg-4); }
    .new-thread-btn .plus { font-size: 16px; color: var(--accent); line-height: 1; }

    .threads-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 6px;
    }

    .thread-item {
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.12s;
      margin-bottom: 2px;
    }
    .thread-item:hover { background: var(--bg-3); }
    .thread-item.active { background: var(--bg-3); border: 0.5px solid var(--border-2); }

    .thread-title {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .thread-meta {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 2px;
    }

    .sidebar-bottom {
      padding: 10px 12px;
      border-top: 0.5px solid var(--border);
    }

    .api-key-row {
      margin-bottom: 8px;
    }

    .api-key-row label { font-size: 11px; color: var(--text-2); display: block; margin-bottom: 3px; }

    .api-key-row input {
      font-size: 12px;
      padding: 6px 10px;
    }

    .user-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--blue-dim);
      border: 0.5px solid var(--blue-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--blue);
      flex-shrink: 0;
    }

    .user-name { font-size: 13px; font-weight: 500; flex: 1; }

    .logout-btn {
      background: none;
      border: none;
      color: var(--text-3);
      cursor: pointer;
      font-size: 12px;
      padding: 4px;
      transition: color 0.15s;
      font-family: inherit;
    }
    .logout-btn:hover { color: var(--text); }

    /* MAIN */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100%;
    }

    #topbar {
      background: var(--bg-2);
      border-bottom: 0.5px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      min-height: 52px;
    }

    #thread-title-display {
      font-size: 14px;
      font-weight: 500;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .online-badge {
      font-size: 11px;
      color: var(--text-2);
      background: var(--bg-3);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      flex-shrink: 0;
    }

    /* EMPTY STATE */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .empty-icon {
      width: 48px;
      height: 48px;
      background: var(--accent-dim);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    #empty-state h2 { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
    #empty-state p { font-size: 13px; color: var(--text-2); margin-bottom: 1.5rem; max-width: 280px; }

    .quick-prompts {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 480px;
    }

    .quick-prompt {
      background: var(--bg-2);
      border: 0.5px solid var(--border-2);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      color: var(--text);
      font-family: inherit;
    }
    .quick-prompt:hover { background: var(--bg-3); border-color: var(--accent-border); color: var(--accent); }

    /* CHAT */
    #chat-view {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg { display: flex; gap: 10px; }
    .msg.user { flex-direction: row-reverse; }

    .msg-inner { display: flex; flex-direction: column; max-width: 80%; }
    .msg.user .msg-inner { align-items: flex-end; }

    .msg-name { font-size: 11px; color: var(--text-2); margin-bottom: 3px; padding: 0 2px; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--blue-dim);
      border: 0.5px solid var(--blue-border);
      border-radius: 16px 16px 4px 16px;
    }

    .msg.assistant .bubble {
      background: var(--bg-2);
      border: 0.5px solid var(--border);
      border-radius: 16px 16px 16px 4px;
    }

    .msg.system-note { justify-content: center; }
    .msg.system-note .bubble {
      background: transparent;
      border: none;
      font-size: 12px;
      color: var(--text-3);
      padding: 4px 0;
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 16px;
    }
    .avatar.user-av { background: var(--blue-dim); color: var(--blue); border: 0.5px solid var(--blue-border); }
    .avatar.ai-av { background: var(--accent-dim); color: var(--accent); border: 0.5px solid var(--accent-border); }

    .thinking { opacity: 0.4; font-style: italic; }

    pre {
      background: var(--bg-3);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      overflow-x: auto;
      font-size: 12px;
      font-family: "SF Mono", "Fira Code", monospace;
      white-space: pre-wrap;
      margin: 8px 0;
    }

    code {
      background: var(--bg-3);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
    }

    /* COMPOSER */
    #composer {
      background: var(--bg-2);
      border-top: 0.5px solid var(--border);
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: var(--bg-3);
      border: 0.5px solid var(--border-2);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      padding: 9px 12px;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      outline: none;
      line-height: 1.5;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--text-2); }

    #send-btn {
      height: 40px;
      padding: 0 16px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
      font-family: inherit;
    }
    #send-btn:hover { opacity: 0.88; }
    #send-btn:disabled { opacity: 0.4; cursor: default; }

    /* MOBILE */
    #sidebar-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 6px 8px;
      font-size: 20px;
      line-height: 1;
    }

    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 10;
    }

    @media (max-width: 640px) {
      #sidebar {
        position: fixed;
        left: -260px;
        top: 0;
        bottom: 0;
        width: 260px;
        min-width: 260px;
        z-index: 20;
        transition: left 0.22s ease;
      }
      #sidebar.open { left: 0; }
      #sidebar-overlay.open { display: block; }
      #sidebar-toggle { display: block; }

      #topbar { padding: 10px 12px; }
      #thread-title-display { font-size: 13px; }

      #messages { padding: 12px 10px; gap: 10px; }
      .bubble { font-size: 14px; padding: 9px 12px; max-width: 88%; }
      .msg-inner { max-width: 88%; }

      #composer {
        padding: 8px 10px;
        padding-bottom: max(8px, env(safe-area-inset-bottom));
        gap: 6px;
      }
      #user-input { font-size: 16px; padding: 10px 12px; }
      #send-btn { height: 44px; padding: 0 14px; font-size: 15px; }

      .quick-prompts { gap: 6px; }
      .quick-prompt { font-size: 13px; padding: 8px 14px; }

      #empty-state { padding: 1.5rem 1rem; }
      #empty-state p { font-size: 13px; }

      .auth-logo { width: 32px; height: 32px; font-size: 16px; }
      #auth-card { padding: 1.5rem; }
      #auth-card h1 { font-size: 17px; }
    }

    .threads-empty {
      padding: 20px 10px;
      text-align: center;
      font-size: 12px;
      color: var(--text-3);
    }

    .threads-section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-3);
      padding: 8px 10px 4px;
    }

    .rock-item { border-left: 2px solid var(--accent); padding-left: 8px; }

    .rock-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .thread-actions {
      display: none;
      gap: 2px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .thread-item:hover .thread-actions { display: flex; }

    .action-btn {
      background: none;
      border: none;
      color: var(--text-3);
      cursor: pointer;
      padding: 2px 4px;
      font-size: 12px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      font-family: inherit;
    }
    .action-btn:hover { color: var(--text); background: var(--bg-4); }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div id="auth-card">
    <div class="auth-logo">H</div>
    <h1 id="auth-title">Sign in</h1>
    <p class="sub" id="auth-sub">Falconridge internal workspace</p>
    <div class="field">
      <label>Username</label>
      <input type="text" id="auth-username" placeholder="e.g. Nathan" maxlength="30" autocomplete="username" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password" />
    </div>
    <div class="field" id="confirm-field" style="display:none;">
      <label>Confirm password</label>
      <input type="password" id="auth-confirm" placeholder="Confirm password" />
    </div>
    <button class="btn-primary" id="auth-btn" onclick="handleAuth()">Sign in</button>
    <div class="auth-error" id="auth-error"></div>
    <div class="auth-toggle">
      <span id="auth-toggle-text">No account?</span>
      <a onclick="toggleAuthMode()"> <span id="auth-toggle-link">Register</span></a>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="layout">
    <div id="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-brand">
          <div class="brand-icon">H</div>
          <span class="brand-name">Falconridge</span>
        </div>
        <button class="new-thread-btn" onclick="newThread()">
          <span class="plus">+</span> New thread
        </button>
      </div>
      <div class="threads-list" id="threads-list">
        <div class="threads-empty">No threads yet</div>
      </div>
      <div class="sidebar-bottom">
        <div class="api-key-row">
          <label>Anthropic API key</label>
          <input type="password" id="api-key-input" placeholder="sk-ant-..." />
        </div>
        <div class="user-row">
          <div class="user-avatar" id="user-avatar"></div>
          <span class="user-name" id="user-name-display"></span>
          <button class="logout-btn" onclick="logout()">Sign out</button>
        </div>
      </div>
    </div>

    <div id="main">
      <div id="topbar">
        <button id="sidebar-toggle" onclick="openSidebar()">&#9776;</button>
        <span id="thread-title-display">Falconridge</span>
        <span class="online-badge" id="user-badge"></span>
      </div>

      <!-- Empty state -->
      <div id="empty-state">
        <div class="empty-icon">H</div>
        <h2>Falconridge workspace</h2>
        <p>Start a new thread or pick up where you left off. All threads are shared between you and TJ.</p>
        <div class="quick-prompts">
          <button class="quick-prompt" onclick="startQuickPrompt('Pressure-test our fund thesis. What are the weakest assumptions?')">Pressure-test thesis</button>
          <button class="quick-prompt" onclick="startQuickPrompt('Draft a concise LP outreach email for a UK family office. Ask me for details first.')">Draft LP email</button>
          <button class="quick-prompt" onclick="startQuickPrompt('Review our fund economics. What should our management fee, carry, and hurdle look like at £25m vs £100m AUM?')">Fund economics</button>
          <button class="quick-prompt" onclick="startQuickPrompt('What are the key regulatory steps we need to take before launching? We are not FCA authorised yet.')">Regulatory roadmap</button>
          <button class="quick-prompt" onclick="startQuickPrompt('Help us build a longlist of UK fund-of-funds and family offices that back emerging managers.')">LP longlist</button>
          <button class="quick-prompt" onclick="startQuickPrompt('Draft a one-page investment thesis summary for Falconridge Fund I. Ask me for any details you need.')">One-page thesis</button>
        </div>
      </div>

      <!-- Chat view -->
      <div id="chat-view">
        <div id="messages"></div>
        <div id="composer">
          <textarea id="user-input" placeholder="Ask anything..." rows="1"></textarea>
          <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://phdgyyhwwhcccxndcthg.supabase.co";
  const SUPABASE_KEY = "sb_publishable_s-LXOeS3VbA1TY6OtIkANA_Lzt2MZo4";

  const SYSTEM_PROMPT = `You are supporting two founders building an AI-native venture capital fund in the UK called Falconridge.

The founders:
- Nathan: ACA, 5 years in profession, Assistant Manager in deal advisory at a top 50 mid-market accounting firm. Background in audit before deals.
- TJ: ACA, 8 years in profession, Manager in deal advisory at KPMG.

The fund (working assumptions - challenge where appropriate):
- Target size: £100m, Fund I. Realistic fallback: £25-40m if first raise is tough.
- Thesis: AI-native VC fund - every function that traditionally required headcount (screening, diligence, memo drafting, portfolio monitoring, reporting) is built into an internal AI engine. Lean ops, smaller team, economics work at lower AUM.
- Cornerstone LP strategy: UK government-backed (British Business Bank, British Patient Capital), UK family offices, fund-of-funds backing emerging managers.
- Deal flow model: AI agents scanning the market, junior analysts, founder network and inbound.
- Governance: advisory board, EOS operating rhythm with monthly rocks.

Writing style:
- British spelling throughout.
- Never use em dashes or long dashes. Only standard short hyphens (-).
- No bold formatting in the middle of sentences or running text.
- Short, punchy paragraphs. Avoid bullet overload. Avoid consultant-speak. No filler praise.
- Default to structured but not over-formatted.

Thinking style:
- Be direct. Challenge assumptions. Push back where appropriate.
- Prioritise commercial insight over theory.
- Flag risks, inconsistencies, and judgement calls clearly.
- Frame things through a deals/investor lens, not an audit lens.
- Assume strong baseline in finance, accounting (UK GAAP), and transactions. Skip the 101.

Operating rhythm:
- EOS framework. Monthly rocks, clear owners (Nathan/TJ/both) and dates.
- Meetings are working sessions. Outputs matter.

Regulatory context:
- Neither founder is FCA-authorised yet.
- Flag regulatory implications (appointed representative route, host AIFM, direct authorisation) whenever relevant.

Confidentiality:
- Any pitch materials, financials, or cap tables shared here are highly sensitive.
- Never reproduce founder data verbatim in summaries that might be shared externally without explicit instruction.
- When drafting anything investor-facing or founder-facing, ask who the audience is before drafting.`;

  // State
  let currentUser = null;
  let currentThreadId = null;
  let conversationHistory = [];
  let isRegisterMode = false;

  // Supabase helpers
  async function sbGet(path) {
    const r = await fetch(SUPABASE_URL + "/rest/v1/" + path, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
    });
    return r.json();
  }

  async function sbPost(path, body) {
    const r = await fetch(SUPABASE_URL + "/rest/v1/" + path, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": "return=representation"
      },
      body: JSON.stringify(body)
    });
    return r.json();
  }

  async function sbPatch(path, body) {
    await fetch(SUPABASE_URL + "/rest/v1/" + path, {
      method: "PATCH",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });
  }

  // Simple hash (not cryptographic - fine for this use case)
  async function hashPassword(password) {
    const msgBuffer = new TextEncoder().encode(password + "hwkrdg_salt");
    const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
  }

  // Auth
  function toggleAuthMode() {
    isRegisterMode = !isRegisterMode;
    document.getElementById("auth-title").textContent = isRegisterMode ? "Create account" : "Sign in";
    document.getElementById("auth-sub").textContent = isRegisterMode ? "Set up your Falconridge access" : "Falconridge internal workspace";
    document.getElementById("auth-btn").textContent = isRegisterMode ? "Create account" : "Sign in";
    document.getElementById("confirm-field").style.display = isRegisterMode ? "block" : "none";
    document.getElementById("auth-toggle-text").textContent = isRegisterMode ? "Already have an account?" : "No account?";
    document.getElementById("auth-toggle-link").textContent = isRegisterMode ? "Sign in" : "Register";
    document.getElementById("auth-error").style.display = "none";
  }

  function showAuthError(msg) {
    const el = document.getElementById("auth-error");
    el.textContent = msg;
    el.style.display = "block";
  }

  async function handleAuth() {
    const username = document.getElementById("auth-username").value.trim();
    const password = document.getElementById("auth-password").value;
    const btn = document.getElementById("auth-btn");

    if (!username || !password) { showAuthError("Please fill in all fields."); return; }

    btn.disabled = true;
    btn.textContent = "Please wait...";

    try {
      const hashed = await hashPassword(password);

      if (isRegisterMode) {
        const confirm = document.getElementById("auth-confirm").value;
        if (password !== confirm) { showAuthError("Passwords do not match."); btn.disabled = false; btn.textContent = "Create account"; return; }
        const existing = await sbGet("users?username=eq." + encodeURIComponent(username));
        if (existing.length > 0) { showAuthError("Username already taken."); btn.disabled = false; btn.textContent = "Create account"; return; }
        const result = await sbPost("users", { username, password: hashed });
        if (result.error) { showAuthError("Error creating account."); btn.disabled = false; btn.textContent = "Create account"; return; }
        currentUser = { username };
      } else {
        const users = await sbGet("users?username=eq." + encodeURIComponent(username) + "&password=eq." + encodeURIComponent(hashed));
        if (!users.length) { showAuthError("Incorrect username or password."); btn.disabled = false; btn.textContent = "Sign in"; return; }
        currentUser = { username };
      }

      sessionStorage.setItem("hw_user", username);
      enterApp();
    } catch(e) {
      showAuthError("Something went wrong. Check your connection.");
      btn.disabled = false;
      btn.textContent = isRegisterMode ? "Create account" : "Sign in";
    }
  }

  function logout() {
    sessionStorage.removeItem("hw_user");
    currentUser = null;
    currentThreadId = null;
    conversationHistory = [];
    document.getElementById("app").style.display = "none";
    document.getElementById("auth-screen").style.display = "flex";
    document.getElementById("auth-username").value = "";
    document.getElementById("auth-password").value = "";
    document.getElementById("auth-btn").disabled = false;
    document.getElementById("auth-btn").textContent = "Sign in";
  }

  function enterApp() {
    document.getElementById("auth-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    const u = currentUser.username;
    document.getElementById("user-name-display").textContent = u;
    document.getElementById("user-avatar").textContent = u.substring(0, 2).toUpperCase();
    document.getElementById("user-badge").textContent = u;
    loadThreads();
    const savedKey = localStorage.getItem("hw_api_key");
    if (savedKey) document.getElementById("api-key-input").value = savedKey;
  }

  // Threads
  async function loadThreads() {
    const threads = await sbGet("threads?order=updated_at.desc");
    renderThreads(threads);
  }

  function renderThreads(threads) {
    const list = document.getElementById("threads-list");
    const visible = threads.filter(t => !t.hidden);
    const hidden = threads.filter(t => t.hidden);
    const rocks = visible.filter(t => t.rock).sort((a,b) => a.rock_order - b.rock_order);
    const regular = visible.filter(t => !t.rock);

    if (!visible.length && !hidden.length) {
      list.innerHTML = '<div class="threads-empty">No threads yet</div>';
      return;
    }

    let html = "";

    if (rocks.length) {
      html += '<div class="threads-section-label">Month 1 rocks</div>';
      html += rocks.map(t => threadItemHtml(t, true)).join("");
    }

    if (regular.length) {
      if (rocks.length) html += '<div class="threads-section-label">Threads</div>';
      html += regular.map(t => threadItemHtml(t, false)).join("");
    }

    if (hidden.length) {
      html += `<div class="threads-section-label toggle-hidden" onclick="toggleHiddenSection()" style="cursor:pointer;">
        Hidden <span id="hidden-toggle-icon">+</span>
      </div>`;
      html += `<div id="hidden-section" style="display:none;">`;
      html += hidden.map(t => threadItemHtml(t, false)).join("");
      html += `</div>`;
    }

    list.innerHTML = html;

    list.querySelectorAll(".thread-item").forEach(el => {
      el.addEventListener("click", function(e) {
        if (e.target.closest(".thread-actions")) return;
        openThread(this.dataset.threadId, this.dataset.threadTitle);
      });
    });

    list.querySelectorAll(".action-rename").forEach(el => {
      el.addEventListener("click", function(e) {
        e.stopPropagation();
        renameThread(this.dataset.id, this.dataset.title);
      });
    });

    list.querySelectorAll(".action-hide").forEach(el => {
      el.addEventListener("click", function(e) {
        e.stopPropagation();
        toggleHideThread(this.dataset.id, this.dataset.hidden === "true");
      });
    });
  }

  function threadItemHtml(t, isRock) {
    return `
      <div class="thread-item ${t.id === currentThreadId ? 'active' : ''} ${isRock ? 'rock-item' : ''}" data-thread-id="${t.id}" data-thread-title="${escHtml(t.title)}">
        <div style="display:flex;align-items:center;gap:4px;">
          ${isRock ? '<span class="rock-dot"></span>' : ''}
          <div class="thread-title">${escHtml(t.title)}</div>
          <div class="thread-actions">
            <button class="action-btn action-rename" data-id="${t.id}" data-title="${escHtml(t.title)}" title="Rename">&#9998;</button>
            <button class="action-btn action-hide" data-id="${t.id}" data-hidden="${t.hidden}" title="${t.hidden ? 'Unhide' : 'Hide'}">${t.hidden ? '&#128065;' : '&#8722;'}</button>
          </div>
        </div>
        <div class="thread-meta">${escHtml(t.created_by)} - ${timeAgo(t.updated_at)}</div>
      </div>
    `;
  }

  function toggleHiddenSection() {
    const sec = document.getElementById("hidden-section");
    const icon = document.getElementById("hidden-toggle-icon");
    if (!sec) return;
    const isHidden = sec.style.display === "none";
    sec.style.display = isHidden ? "block" : "none";
    if (icon) icon.textContent = isHidden ? "-" : "+";
  }

  async function renameThread(id, currentTitle) {
    const newTitle = prompt("Rename thread:", currentTitle);
    if (!newTitle || !newTitle.trim() || newTitle.trim() === currentTitle) return;
    await sbPatch("threads?id=eq." + id, { title: newTitle.trim() });
    if (currentThreadId === id) {
      document.getElementById("thread-title-display").textContent = newTitle.trim();
    }
    await loadThreads();
  }

  async function toggleHideThread(id, isCurrentlyHidden) {
    await sbPatch("threads?id=eq." + id, { hidden: !isCurrentlyHidden });
    if (currentThreadId === id && !isCurrentlyHidden) {
      document.getElementById("empty-state").style.display = "flex";
      document.getElementById("chat-view").style.display = "none";
      currentThreadId = null;
    }
    await loadThreads();
  }

  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr + (dateStr.endsWith("Z") ? "" : "Z")).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return "just now";
    if (mins < 60) return mins + "m ago";
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + "h ago";
    return Math.floor(hrs / 24) + "d ago";
  }

  async function newThread() {
    const title = prompt("Thread title:");
    if (!title || !title.trim()) return;
    closeSidebar();
    const result = await sbPost("threads", {
      title: title.trim(),
      created_by: currentUser.username
    });
    if (result && result[0]) {
      await loadThreads();
      openThread(result[0].id, result[0].title);
    }
  }

  async function openThread(threadId, title) {
    currentThreadId = threadId;
    conversationHistory = [];
    document.getElementById("thread-title-display").textContent = title;
    document.getElementById("empty-state").style.display = "none";
    document.getElementById("chat-view").style.display = "flex";
    document.getElementById("messages").innerHTML = "";
    closeSidebar();

    // Highlight active thread
    document.querySelectorAll(".thread-item").forEach(el => {
      el.classList.toggle("active", el.dataset.threadId === threadId);
    });

    // Load messages
    const messages = await sbGet("messages?thread_id=eq." + threadId + "&order=created_at.asc");
    messages.forEach(m => {
      addMessageToUI(m.role, m.content, m.username || (m.role === "assistant" ? "Claude" : m.username));
      if (m.role === "user" || m.role === "assistant") {
        conversationHistory.push({ role: m.role, content: m.content });
      }
    });

    if (messages.length === 0) {
      addSystemNote("Thread started by " + currentUser.username);
    }
  }

  async function startQuickPrompt(prompt) {
    const title = prompt.substring(0, 40) + (prompt.length > 40 ? "..." : "");
    const result = await sbPost("threads", {
      title: title,
      created_by: currentUser.username
    });
    if (result && result[0]) {
      await loadThreads();
      currentThreadId = result[0].id;
      conversationHistory = [];
      document.getElementById("thread-title-display").textContent = result[0].title;
      document.getElementById("empty-state").style.display = "none";
      document.getElementById("chat-view").style.display = "flex";
      document.getElementById("messages").innerHTML = "";
      addSystemNote("Thread started by " + currentUser.username);
      await sendMessageWithText(prompt);
    }
  }

  // Messaging
  function addSystemNote(text) {
    const msgs = document.getElementById("messages");
    const row = document.createElement("div");
    row.className = "msg system-note";
    row.innerHTML = '<div class="bubble">' + escHtml(text) + '</div>';
    msgs.appendChild(row);
    scrollBottom();
  }

  function addMessageToUI(role, text, name) {
    const msgs = document.getElementById("messages");
    const row = document.createElement("div");
    row.className = "msg " + role;

    const initials = (name || "AI").substring(0, 2).toUpperCase();
    const avClass = role === "user" ? "user-av" : "ai-av";

    const av = document.createElement("div");
    av.className = "avatar " + avClass;
    av.textContent = initials;

    const nameEl = document.createElement("div");
    nameEl.className = "msg-name";
    nameEl.textContent = name || "Claude";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = formatText(text);

    const inner = document.createElement("div");
    inner.className = "msg-inner";
    inner.appendChild(nameEl);
    inner.appendChild(bubble);

    if (role === "user") {
      row.appendChild(inner);
      row.appendChild(av);
    } else {
      row.appendChild(av);
      row.appendChild(inner);
    }

    msgs.appendChild(row);
    scrollBottom();
    return bubble;
  }

  async function sendMessage() {
    const input = document.getElementById("user-input");
    const text = input.value.trim();
    if (!text || !currentThreadId) return;
    input.value = "";
    input.style.height = "auto";
    await sendMessageWithText(text);
  }

  async function sendMessageWithText(text) {
    const apiKey = document.getElementById("api-key-input").value.trim();
    if (!apiKey) { alert("Please enter your Anthropic API key in the sidebar."); return; }
    if (!currentThreadId) return;
    localStorage.setItem("hw_api_key", apiKey);

    // Save user message
    await sbPost("messages", {
      thread_id: currentThreadId,
      role: "user",
      content: text,
      username: currentUser.username
    });

    await sbPatch("threads?id=eq." + currentThreadId, { updated_at: new Date().toISOString() });

    addMessageToUI("user", text, currentUser.username);
    conversationHistory.push({ role: "user", content: text });

    const thinkingBubble = addMessageToUI("assistant", "Thinking...", "Claude");
    thinkingBubble.classList.add("thinking");
    document.getElementById("send-btn").disabled = true;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 2000,
          system: SYSTEM_PROMPT,
          tools: [{ type: "web_search_20250305", name: "web_search" }],
          messages: conversationHistory
        })
      });

      const data = await response.json();

      if (data.content && data.content.length > 0) {
        const reply = data.content
          .filter(b => b.type === "text")
          .map(b => b.text)
          .join("\n");
        const finalReply = reply || "I searched but couldn't find a clear answer.";
        thinkingBubble.classList.remove("thinking");
        thinkingBubble.innerHTML = formatText(finalReply);
        conversationHistory.push({ role: "assistant", content: finalReply });

        // Save assistant message
        await sbPost("messages", {
          thread_id: currentThreadId,
          role: "assistant",
          content: finalReply,
          username: "Claude"
        });

        await sbPatch("threads?id=eq." + currentThreadId, { updated_at: new Date().toISOString() });
        await loadThreads();
      } else {
        thinkingBubble.classList.remove("thinking");
        thinkingBubble.textContent = "Error: " + (data.error?.message || "Unknown error.");
      }
    } catch(e) {
      thinkingBubble.classList.remove("thinking");
      thinkingBubble.textContent = "Network error. Check your API key and connection.";
    }

    document.getElementById("send-btn").disabled = false;
  }

  // Utils
  function escHtml(t) {
    return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function formatText(text) {
    let t = escHtml(text);
    t = t.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
    t = t.replace(/`([^`\n]+)`/g, '<code>$1</code>');
    t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    t = t.replace(/\n/g, '<br>');
    return t;
  }

  function scrollBottom() {
    const msgs = document.getElementById("messages");
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
  }

  // Mobile sidebar
  function openSidebar() {
    document.getElementById("sidebar").classList.add("open");
    document.getElementById("sidebar-overlay").classList.add("open");
  }

  function closeSidebar() {
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("sidebar-overlay").classList.remove("open");
  }

  // Keyboard
  document.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && (document.activeElement === document.getElementById("auth-password") || document.activeElement === document.getElementById("auth-confirm"))) {
      handleAuth();
    }
  });

  document.addEventListener("DOMContentLoaded", function() {
    const textarea = document.getElementById("user-input");
    if (textarea) {
      textarea.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
        this.style.height = "auto";
        this.style.height = Math.min(this.scrollHeight, 120) + "px";
      });
    }

    // Check session
    const saved = sessionStorage.getItem("hw_user");
    if (saved) {
      currentUser = { username: saved };
      enterApp();
    }
  });
</script>
