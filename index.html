<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hawkridge Workspace</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --bg-2: #1a1a1a;
      --bg-3: #242424;
      --border: rgba(255,255,255,0.1);
      --border-2: rgba(255,255,255,0.18);
      --text: #f0f0f0;
      --text-2: #999;
      --accent: #1D9E75;
      --accent-bg: rgba(29,158,117,0.12);
      --blue-bg: rgba(55,138,221,0.12);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
    }

    /* Lock screen */
    #lock-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    #lock-card {
      background: var(--bg-2);
      border: 0.5px solid var(--border-2);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 380px;
    }

    .lock-logo {
      width: 36px;
      height: 36px;
      background: var(--accent-bg);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    .lock-logo svg { width: 18px; height: 18px; fill: var(--accent); }

    #lock-card h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    #lock-card p {
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 1.5rem;
    }

    .field {
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: var(--text-2);
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--bg-3);
      border: 0.5px solid var(--border-2);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: var(--accent); }

    #enter-btn {
      width: 100%;
      margin-top: 16px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      padding: 10px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    #enter-btn:hover { opacity: 0.88; }

    #lock-error {
      font-size: 12px;
      color: #e24b4a;
      margin-top: 10px;
      display: none;
    }

    /* App */
    #app {
      display: none;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    #topbar {
      background: var(--bg-2);
      border-bottom: 0.5px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

    #topbar .title { font-size: 14px; font-weight: 600; }

    #topbar .user-badge {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-2);
      background: var(--bg-3);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg { display: flex; gap: 10px; max-width: 100%; }
    .msg.user { flex-direction: row-reverse; }

    .msg-inner { display: flex; flex-direction: column; max-width: 82%; }
    .msg.user .msg-inner { align-items: flex-end; }

    .msg-name {
      font-size: 11px;
      color: var(--text-2);
      margin-bottom: 3px;
      padding: 0 2px;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--blue-bg);
      border: 0.5px solid rgba(55,138,221,0.25);
      border-radius: 16px 16px 4px 16px;
    }

    .msg.assistant .bubble {
      background: var(--bg-2);
      border: 0.5px solid var(--border);
      border-radius: 16px 16px 16px 4px;
    }

    .msg.system-note {
      justify-content: center;
    }

    .msg.system-note .bubble {
      background: transparent;
      border: none;
      font-size: 12px;
      color: var(--text-2);
      text-align: center;
      padding: 4px 0;
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 16px;
    }

    .avatar.user-av { background: var(--blue-bg); color: #378ADD; border: 0.5px solid rgba(55,138,221,0.3); }
    .avatar.ai-av { background: var(--accent-bg); color: var(--accent); border: 0.5px solid rgba(29,158,117,0.3); }

    .thinking { opacity: 0.45; font-style: italic; }

    pre {
      background: var(--bg-3);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      overflow-x: auto;
      font-size: 12px;
      font-family: "SF Mono", "Fira Code", monospace;
      white-space: pre-wrap;
      margin: 8px 0;
    }

    code {
      background: var(--bg-3);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
    }

    /* Composer */
    #composer {
      background: var(--bg-2);
      border-top: 0.5px solid var(--border);
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: var(--bg-3);
      border: 0.5px solid var(--border-2);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      padding: 9px 12px;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      outline: none;
      line-height: 1.5;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--text-2); }

    #send-btn {
      height: 40px;
      padding: 0 16px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    #send-btn:hover { opacity: 0.88; }
    #send-btn:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>

<div id="lock-screen">
  <div id="lock-card">
    <div class="lock-logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <h1>Hawkridge</h1>
    <p>Internal workspace. Enter your details to continue.</p>
    <div class="field">
      <label>Your name</label>
      <input type="text" id="name-input" placeholder="Nathan or TJ" maxlength="20" />
    </div>
    <div class="field">
      <label>Passcode</label>
      <input type="password" id="passcode-input" placeholder="Shared passcode" />
    </div>
    <div class="field">
      <label>Anthropic API key</label>
      <input type="password" id="api-key-input" placeholder="sk-ant-..." />
    </div>
    <button id="enter-btn" onclick="unlock()">Enter workspace</button>
    <div id="lock-error">Incorrect passcode. Try again.</div>
  </div>
</div>

<div id="app">
  <div id="topbar">
    <div class="dot"></div>
    <span class="title">Hawkridge</span>
    <span class="user-badge" id="user-label"></span>
  </div>
  <div id="messages"></div>
  <div id="composer">
    <textarea id="user-input" placeholder="Ask anything..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const PASSCODE = "dealteam25";

  const SYSTEM_PROMPT = `You are supporting two founders building an AI-native venture capital fund in the UK called Hawkridge.

The founders:
- Nathan: ACA, 5 years in profession, Assistant Manager in deal advisory at a top 50 mid-market accounting firm. Background in audit before deals.
- TJ: ACA, 8 years in profession, Manager in deal advisory at KPMG.

The fund (working assumptions - challenge where appropriate):
- Target size: £100m, Fund I. Realistic fallback: £25-40m if first raise is tough.
- Thesis: AI-native VC fund - every function that traditionally required headcount (screening, diligence, memo drafting, portfolio monitoring, reporting) is built into an internal AI engine. Lean ops, smaller team, economics work at lower AUM.
- Cornerstone LP strategy: UK government-backed (British Business Bank, British Patient Capital), UK family offices, fund-of-funds backing emerging managers.
- Deal flow model: AI agents scanning the market, junior analysts, founder network and inbound.
- Governance: advisory board, EOS operating rhythm with monthly rocks.

Writing style:
- British spelling throughout.
- Never use em dashes or long dashes. Only standard short hyphens (-).
- No bold formatting in the middle of sentences or running text.
- Short, punchy paragraphs. Avoid bullet overload. Avoid consultant-speak. No filler praise.
- Default to structured but not over-formatted.

Thinking style:
- Be direct. Challenge assumptions. Push back where appropriate.
- Prioritise commercial insight over theory.
- Flag risks, inconsistencies, and judgement calls clearly.
- Frame things through a deals/investor lens, not an audit lens.
- Assume strong baseline in finance, accounting (UK GAAP), and transactions. Skip the 101.

Operating rhythm:
- EOS framework. Monthly rocks, clear owners (Nathan/TJ/both) and dates.
- Meetings are working sessions. Outputs matter.

Regulatory context:
- Neither founder is FCA-authorised yet.
- Flag regulatory implications (appointed representative route, host AIFM, direct authorisation) whenever relevant.

Confidentiality:
- Any pitch materials, financials, or cap tables shared here are highly sensitive.
- Never reproduce founder data verbatim in summaries that might be shared externally without explicit instruction.
- When drafting anything investor-facing or founder-facing, ask who the audience is before drafting.`;

  let userName = "";
  let apiKey = "";
  let conversationHistory = [];

  function unlock() {
    const name = document.getElementById("name-input").value.trim();
    const passcode = document.getElementById("passcode-input").value.trim();
    const key = document.getElementById("api-key-input").value.trim();

    if (passcode !== PASSCODE) {
      document.getElementById("lock-error").style.display = "block";
      return;
    }
    if (!name) { alert("Please enter your name."); return; }
    if (!key.startsWith("sk-ant-")) { alert("Please enter a valid Anthropic API key."); return; }

    userName = name;
    apiKey = key;
    document.getElementById("lock-error").style.display = "none";
    document.getElementById("user-label").textContent = userName;
    document.getElementById("lock-screen").style.display = "none";
    document.getElementById("app").style.display = "flex";

    addSystemNote("Signed in as " + userName);
  }

  function addSystemNote(text) {
    const msgs = document.getElementById("messages");
    const row = document.createElement("div");
    row.className = "msg system-note";
    row.innerHTML = '<div class="bubble">' + escHtml(text) + '</div>';
    msgs.appendChild(row);
    scrollBottom();
  }

  function addMessage(role, text, name) {
    const msgs = document.getElementById("messages");
    const row = document.createElement("div");
    row.className = "msg " + role;

    const initials = (name || "AI").substring(0, 2).toUpperCase();
    const avClass = role === "user" ? "user-av" : "ai-av";

    const av = document.createElement("div");
    av.className = "avatar " + avClass;
    av.textContent = initials;

    const nameEl = document.createElement("div");
    nameEl.className = "msg-name";
    nameEl.textContent = name || "Claude";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = formatText(text);

    const inner = document.createElement("div");
    inner.className = "msg-inner";
    inner.appendChild(nameEl);
    inner.appendChild(bubble);

    row.appendChild(av);
    if (role === "user") {
      row.insertBefore(inner, av);
    } else {
      row.appendChild(inner);
    }

    msgs.appendChild(row);
    scrollBottom();
    return bubble;
  }

  function escHtml(t) {
    return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function formatText(text) {
    let t = escHtml(text);
    t = t.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
    t = t.replace(/`([^`\n]+)`/g, '<code>$1</code>');
    t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    t = t.replace(/\n/g, '<br>');
    return t;
  }

  function scrollBottom() {
    const msgs = document.getElementById("messages");
    msgs.scrollTop = msgs.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById("user-input");
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    input.style.height = "auto";

    addMessage("user", text, userName);
    conversationHistory.push({ role: "user", content: text });

    const thinkingBubble = addMessage("assistant", "Thinking...", "Claude");
    thinkingBubble.classList.add("thinking");
    document.getElementById("send-btn").disabled = true;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1500,
          system: SYSTEM_PROMPT,
          messages: conversationHistory
        })
      });

      const data = await response.json();

      if (data.content && data.content[0]) {
        const reply = data.content[0].text;
        thinkingBubble.classList.remove("thinking");
        thinkingBubble.innerHTML = formatText(reply);
        conversationHistory.push({ role: "assistant", content: reply });
      } else {
        thinkingBubble.classList.remove("thinking");
        thinkingBubble.textContent = "Error: " + (data.error?.message || "Unknown error.");
      }
    } catch (err) {
      thinkingBubble.classList.remove("thinking");
      thinkingBubble.textContent = "Network error. Check your API key and connection.";
    }

    document.getElementById("send-btn").disabled = false;
    scrollBottom();
  }

  document.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && document.activeElement === document.getElementById("passcode-input")) {
      unlock();
    }
  });

  document.getElementById("user-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 120) + "px";
  });
</script>
</body>
</html>
